volumes:
  mattermost-data:
  mattermost-postgres:

services:
  mattermost:
    image: mattermost/mattermost-preview
    ports:
    - 8065:8065
    environment:
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: "true"
      MM_LOGSETTINGS_CONSOLELEVEL: INFO
      MM_PLUGINSETTINGS_ENABLE: "false"
    volumes:
    - mattermost-data:/mm/mattermost-data
    - mattermost-postgres:/var/lib/postgresql/data

  bot:
    build:
      context: .
    depends_on:
    - mattermost
    environment:
      MATTERMOST_BOT_URL: http://mattermost
      MATTERMOST_PORT: 8065
      MATTERMOST_BOT_TOKEN: ${MATTERMOST_BOT_TOKEN:-replace-me}
      MATTERMOST_BOT_TEAM: ${MATTERMOST_BOT_TEAM:-eyfadmin}
      MATTERMOST_BOT_SSL_VERIFY: "false"
      EYF_CHANNEL: ${EYF_CHANNEL:-eyf}
      EYF_LANG: ${EYF_LANG:-fr}
      EYF_LOCALE: ${EYF_LOCALE:-fr}
      EYF_FORCED_WORDS: ${EYF_FORCED_WORDS:-}
      EYF_WORD_TIME_LIMIT: ${EYF_WORD_TIME_LIMIT:-50}
      EYF_TIME_PER_HINT: ${EYF_TIME_PER_HINT:-10}
      EYF_POINTS_LIMIT: ${EYF_POINTS_LIMIT:-40}
    command:
    - /bin/sh
    - -lc
    - |
      if [ "$${MATTERMOST_BOT_TOKEN}" = "replace-me" ] || [ -z "$${MATTERMOST_BOT_TOKEN}" ]; then
        echo "Set MATTERMOST_BOT_TOKEN to a valid Mattermost token before starting the bot."
        exit 1
      fi
      until curl -fsS http://mattermost:8065/api/v4/system/ping >/dev/null 2>&1; do
        sleep 2
      done
      exec poetry run python eyf.py

  player:
    profiles:
    - test
    build:
      context: .
    depends_on:
    - mattermost
    - bot
    environment:
      MATTERMOST_URL: http://mattermost:8065
      MATTERMOST_ADMIN_EMAIL: ${MATTERMOST_ADMIN_EMAIL:-admin@admin.admin}
      MATTERMOST_ADMIN_PASSWORD: ${MATTERMOST_ADMIN_PASSWORD:-adminadmin}
      MATTERMOST_PLAYER_EMAIL: ${MATTERMOST_PLAYER_EMAIL:-player@player.player}
      MATTERMOST_PLAYER_USERNAME: ${MATTERMOST_PLAYER_USERNAME:-player}
      MATTERMOST_PLAYER_PASSWORD: ${MATTERMOST_PLAYER_PASSWORD:-playerplayer}
      MATTERMOST_PLAYER_TEAM: ${MATTERMOST_PLAYER_TEAM:-eyfadmin}
      MATTERMOST_PLAYER_CHANNEL: ${EYF_CHANNEL:-eyf}
      MATTERMOST_BOT_USERNAME: ${MATTERMOST_BOT_USERNAME:-admin}
    command:
    - poetry
    - run
    - python
    - game_player.py
